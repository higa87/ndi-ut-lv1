<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDI UT LV1 1.1</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { max-width: 800px; width: 100%; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; }
        .mode-selection { text-align: center; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mode-btn { padding: 12px; font-size: 1rem; cursor: pointer; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        .mode-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .full-width { grid-column: span 2; padding: 18px; font-size: 1.2rem; }
        .all-challenge { background: #333 !important; }
        .custom-area { grid-column: span 2; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px dashed #ccc; margin-top: 10px; }
        .config-area { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .question-box { font-size: 1.25rem; line-height: 1.8; margin-bottom: 25px; color: #222; font-weight: 500; white-space: pre-wrap; }
        .q-image { width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 25px; border: 1px solid #eee; border-radius: 8px; display: none; }
        .options-grid { display: grid; gap: 15px; }
        button.option { padding: 20px; border: 2px solid #eee; border-radius: 12px; background: white; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1.05rem; color: #444; line-height: 1.5; }
        button.option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background: #e6ffed !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background: #fff5f5 !important; border-color: #dc3545 !important; color: #721c24; }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; background: #f8f9fa; border: 1px solid #ddd; }
        .next-btn { width: 100%; padding: 18px; color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; background: var(--primary); }
        .result-screen { text-align: center; display: none; }
        .exp-text { margin-top: 10px; font-size: 1.1rem; color: #0056b3; border-top: 1px dashed #ccc; padding-top: 10px; font-weight: bold; }
        .exp-image { width: 100%; max-height: 300px; object-fit: contain; margin-top: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="start-screen" class="mode-selection">
        <h2>NDI UT LV1 1.1</h2>
        <div class="config-area">
            <label style="font-weight:bold; cursor:pointer;">
                <input type="checkbox" id="shuffleCheck" style="transform: scale(1.3); margin-right: 8px;"> 
                出題順をランダム（シャッフル）にする
            </label>
        </div>
        <div class="mode-grid">
            <button class="mode-btn" onclick="startMode(10)">入門（10問）</button>
            <button class="mode-btn" onclick="startMode(20)">初級（20問）</button>
            <button class="mode-btn full-width all-challenge" onclick="startMode('all')">全問チャレンジ（一気に解く）</button>
            <div class="custom-area">
                <p style="margin:0 0 10px; font-weight:bold;">【範囲指定モード】</p>
                <input type="number" id="customStart" placeholder="開始番号" style="padding:8px; width:80px;"> 〜 
                <input type="number" id="customEnd" placeholder="終了番号" style="padding:8px; width:80px;">
                <button class="mode-btn" style="padding:8px 20px; margin-left:10px;" onclick="startCustom()">スタート</button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="header">
            <span id="q-counter">Q. 1 / 10</span>
            <span id="error-counter" style="color: var(--danger);">ミス: 0</span>
        </div>
        <div class="question-box" id="q-text">問題文がここに入ります</div>
        <img id="q-img" class="q-image" src="" alt="問題画像">
        <div class="options-grid" id="options-area"></div>
        
        <div id="feedback-area" class="feedback">
            <div id="feedback-msg" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="feedback-exp" class="exp-text" style="display:none;"></div>
            <img id="exp-img" class="exp-image" src="" style="display:none;" alt="解説画像">
        </div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2 id="result-msg"></h2>
        <div id="result-actions" style="margin-top: 30px;"></div>
    </div>
</div>

<script>
    const quizData = [{ q: "問 1.1.1 次の文は，非破壊試験（NDT）の目的について述べたものである。最も適切なものを一つ選び，記号で答えよ。", options: ["a）工業製品が健全であるかどうかを診断するために，NDTが行われる。", "b）工業製品の発注者が価格を上げるために，NDTが行われる。", "c）工業製品の発注者が安心して製品を使用するために，NDTが行われる。", "d）工業製品の大量生産を可能にするために，NDTが行われる。"], ans: 1, exp: "" },
    { q: "問 1.1.2 次の文は，非破壊試験（NDT）の目的について述べたものである。最も適切なものを一つ選び，記号で答えよ。", options: ["a）工業製品の製作時間を短縮するために行う。", "b）工業製品の品質管理のために行う。", "c）工業製品の生産工程を簡素化するために行う。", "d）工業製品を軽量化するために行う。"], ans: 2, exp: "" },
    { q: "問 1.1.3 次の文は，UTレベル1技術者が実施できることについて述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）探傷作業中に，客先からNDT指示書について変更の申し出があり，それに従って直ちに変更し作業をすることができる。", "b）JIS規格によって探傷作業中表示器にきずエコーが現れたので，直ちに上位技術者レベル2又はレベル3にきずの分類を依頼した。", "c）きずエコーが検出された場合は，探触子及びきずの位置，エコー高さ，きずの指示長さ等を正確に測定し，他の技術者が再現できるように記録する。", "d）超音波探傷作業中に，著しく指示書と寸法形状が異なる試験体があったが，材質が同じなのでそのまま探傷を継続する判断をした。"], ans: 3, exp: "" },
    { q: "問 1.1.4 次の文は，UTレベル1技術者が実施できることについて述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）超音波探傷試験を行うときは，きずエコーのみを注意深く観察し，妨害エコーなどは無視して探傷してよい。", "b）超音波探傷試験に関するNDT指示書を作成・変更することができる。", "c）文章化された判定基準がある場合は，レベル3技術者の許可がなくてもきずの分類を行い，合否判定をして，報告することができる。", "d）レベル2又は，レベル3技術者の監督のもとで，超音波探傷試験指示書に基づいて超音波探傷試験を行うことができる。"], ans: 4, exp: "" },
    { q: "問 1.1.5 次の文は，JIS Z 2305について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）放射線透過試験だけについて主な用語と，その定義について記載されている。", "b）超音波探傷試験だけについて主な用語と，その定義について記載されている。", "c）溶接部のきず名称や発生箇所について記載されている。", "d）超音波探傷技術者の役割について記載されている。"], ans: 4, exp: "" },
    { q: "問 1.1.6 次の文は，JIS Z 2300について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）工業分野で用いる非破壊試験に関する主な用語と，その定義について規定している。", "b）工業分野で用いる非破壊試験装置に関する仕様や取扱い方法について規定している。", "c）工業分野で用いる非破壊試験での消耗品（接触媒質など）や工具について規定している。", "d）工業分野で用いる非破壊試験の適用できる工業製品について規定している。"], ans: 1, exp: "" },
    { q: "問 1.1.7 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「前面板」は，斜角探触子だけに使用される用語である。", "b）「ダンパ」は，斜角探触子だけに使用される用語である。", "c）「吸音材」は，垂直探触子だけに使用される用語である。", "d）「保護膜」は，垂直探触子だけに使用される用語である。"], ans: 4, exp: "" },
    { q: "問 1.1.8 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「STB屈折角」は，斜角探傷だけに使用される用語である。", "b）「ビーム路程」は，斜角探傷だけに使用される用語である。", "c）「探傷屈折角」は，垂直探傷だけに使用される用語である。", "d）「公称屈折角」は，垂直探傷だけに使用される用語である。"], ans: 1, exp: "" },
    { q: "問 1.1.9 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「円柱面エコー」は，斜角探傷だけに使用される用語である。", "b）「遅れエコー」は，斜角探傷だけに使用される用語である。", "c）「底面エコー」は，垂直探傷だけに使用される用語である。", "d）「きずエコー」は，垂直探傷だけに使用される用語である。"], ans: 3, exp: "" },
    { q: "問 1.1.10 次の文は，超音波探傷試験で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「円柱面エコー」は，表面波探傷だけに使用される用語である。", "b）「遅れエコー」は，垂直探傷だけに使用される用語である。", "c）「底面エコー」は，斜角探傷だけに使用される用語である。", "d）「きずエコー」は，斜角探傷だけに使用される用語である。"], ans: 2, exp: "" },
    { q: "問 1.1.11 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「モード変換」は，斜角探傷だけに使用される用語である。", "b）「スキップ」は，斜角探傷だけに使用される用語である。", "c）「指向角」は，垂直探傷だけに使用される用語である。", "d）「積算効果」は，斜角探傷だけに使用される用語である。"], ans: 2, exp: "" },
    { q: "問 1.1.12 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「直射法」は，垂直探傷だけに使用される用語である。", "b）「透過法」は，斜角探傷だけに使用される用語である。", "c）「一回反射法」は，斜角探傷だけに使用される用語である。", "d）「パルス反射法」は，斜角探傷だけに使用される用語である。"], ans: 3, exp: "" },
    { q: "問 1.1.13 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「入射点」は，垂直探傷だけに使用される用語である。", "b）「F/B」は，斜角探傷だけに使用される用語である。", "c）「距離振幅特性」は，斜角探傷だけに使用される用語である。", "d）「積算効果」は，垂直探傷だけに使用される用語である。"], ans: 4, exp: "" },
    { q: "問 1.1.14 斜角探傷で 0.5S や 1.0S という記号は何の意味か。下記のうち該当するものを一つ選び，記号で答えよ。", options: ["a）超音波ビームが探傷面と反対側の面又は探傷面で反射する点を表す記号", "b）感度表示の記号", "c）入射点と試験体端面の距離を表す記号", "d）探傷面の粗さを表す記号"], ans: 1, exp: "" },
    { q: "問 1.1.15 次の文は，溶接部の斜角探傷に関する用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）斜角探触子を溶接線に対して，一定角度で前後に動かす方法を斜め平行走査という。", "b）斜角探触子の入射点から溶接部の基準線までの探傷面上の距離を探触子きず距離という。", "c）余盛のために斜角探触子を近づけることができないため，探傷断面上で超音波ビームが当たらない領域を探傷不能領域という。", "d）接近限界長さは斜角探触子を溶接部に最も接近させた場合の，溶接部中心までのビーム路程をいう。"], ans: 3, exp: "" },
    { q: "問 1.2.1 次の文は，超音波探傷試験に関する規格について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）JIS Z 2344 は，鋼溶接部の超音波探傷試験方法についての規格である。", "b）JIS Z 3060 は，鋼溶接部の超音波探傷試験方法についての規格である。", "c）JIS Z 0587 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "d）JIS Z 0801 は，建築用鋼板及び平鋼の超音波探傷試験による等級分類及び判定基準についての規格である。"], ans: 2, exp: "" },
    { q: "問 1.2.2 次の文は，超音波探傷試験に関する規格について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）JIS G 0801 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "b）JIS G 3104 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "c）JIS G 0587 は，鋼溶接部の超音波探傷試験方法についての規格である。", "d）JIS G 3060 は，鋼溶接部の超音波探傷試験方法についての規格である。"], ans: 1, exp: "" },
    { q: "問 1.2.3 次の文は，JIS G 0587 について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）超音波探傷試験用標準試験片に関する規格である。", "b）鋼溶接部の超音波探傷試験方法に関する規格である。", "c）炭素鋼鍛鋼品及び低合金鋼鍛鋼品の超音波探傷試験方法に関する規格である。", "d）金属材料のパルス反射法による超音波探傷試験方法通則に関する規格である。"], ans: 3, exp: "" },
    { q: "問 1.2.4 次の文は，JIS Z 2355-1 について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）非破壊試験－超音波厚さ測定－第1部：測定方法に関する規格である。", "b）超音波探触子の性能測定方法に関する規格である。", "c）圧力容器用鋼板の超音波探傷検査方法に関する規格である。", "d）ステンレス鋼板の超音波探傷検査方法に関する規格である。"], ans: 1, exp: "" },
    { q: "問 2.1.1 次の文は，超音波について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）超音波とは，周波数が約 20 kHz 以上の人間の耳に聞こえない音波のことである。", "b）超音波とは，周波数が約 200 kHz 以上の人間の耳に聞こえない音波のことである。", "c）超音波は，電波と同じように，真空中でも伝搬する。", "d）超音波は，電気伝導体中を伝搬しない。"], ans: 1, exp: "" },
    { q: "問 2.1.2 次の用語は，1秒間の振動数を表している。正しいものを一つ選び，記号で答えよ。", options: ["a）音速", "b）周波数", "c）周期", "d）波長"], ans: 2, exp: "" },
    { q: "問 2.1.3 次の文は，周波数，音速及び波長の関係について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）周波数が高くなると，波長は短くなる。", "b）周波数が高くなると，波長は長くなる。", "c）周波数が変化しても，波長は変化しない。", "d）周波数が高くなり，音速が遅くなれば波長は長くなる。"], ans: 1, exp: "" },
    { q: "問 2.1.4 次の文は，超音波について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）横波は，粒子の振動方向と波の進行方向とが平行な波である。", "b）縦波が横波にモード変換するときは，振動様式が変わるだけで音速は変わらない。", "c）媒質中を伝搬する縦波の音速は，周波数によって常に変化する。", "d）小さなきずまで検出するためには，一般的に波長の短い超音波を使う。"], ans: 4, exp: "" },
    { q: "問 2.1.5 次の文は，超音波の音速について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）音速は，超音波が伝搬する材質が異なっても変化しない。", "b）音速は，超音波の種類によって変化する。", "c）音速は，超音波の周波数によって変化する。", "d）音速は，振動子の大きさによって変化する。"], ans: 2, exp: "" },
    { q: "問 2.1.6 次に示す数値は，厚さ 100 mm の鋼板表裏面間を往復する超音波縦波の伝搬時間である。正しいものを一つ選び，記号で答えよ。ただし，鋼板中の縦波音速は 5900 m/s とする。", options: ["a）約 3.4 × 10^-6 sec.", "b）約 3.4 × 10^-5 sec.", "c）約 1.7 × 10^-5 sec.", "d）約 1.7 × 10^-4 sec."], ans: 2, exp: "" },
    { q: "問 2.1.7 次の文は，鋼試験体を斜角探傷するときの測定範囲の調整における音速設定について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）対象物が鋼であれば横波音速は 3230 m/s に設定すれば良い。", "b）対象物が鋼であっても音速は確認する必要がある。", "c）横波は縦波の約 1/2 の音速に設定しておけばよい。", "d）周波数によって音速設定は変える必要がある。"], ans: 2, exp: "" },

    let pool = []; 
    let currentQuestionIndex = 0;
    let errors = 0;
    let globalStart = 0;
    let setSize = 0;

    function startMode(size) {
        const isShuffle = document.getElementById('shuffleCheck').checked;
        
        if (size === 'all') {
            pool = [...quizData];
        } else {
            let tempPool = [...quizData];
            if (isShuffle) shuffleArray(tempPool);
            pool = tempPool.slice(0, Math.min(size, quizData.length));
        }
        
        if (isShuffle && size === 'all'){
           shuffleArray(pool);
        }

        globalStart = 0;
        setSize = pool.length;
        prepareSet(0);
    }

    function startCustom() {
        const s = parseInt(document.getElementById('customStart').value);
        const e = parseInt(document.getElementById('customEnd').value);
        const isShuffle = document.getElementById('shuffleCheck').checked;

        if(isNaN(s) || isNaN(e) || s < 1 || e > quizData.length || s > e) {
            alert(`正しい範囲を入力してください (1 〜 ${quizData.length})`);
            return;
        }
        
        pool = quizData.slice(s - 1, e);
        if (isShuffle) shuffleArray(pool);

        globalStart = 0;
        setSize = pool.length;
        prepareSet(0);
    }

    function prepareSet(startIdx) {
        currentQuestionIndex = startIdx;
        errors = 0;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function loadQuestion() {
        if (currentQuestionIndex >= pool.length) {
            showResult();
            return;
        }

        const qData = pool[currentQuestionIndex];
        document.getElementById('q-counter').innerText = `Q. ${currentQuestionIndex + 1} / ${pool.length}`;
        document.getElementById('error-counter').innerText = `ミス: ${errors}`;
        
        document.getElementById('q-text').innerText = qData.q;
        
        const imgEl = document.getElementById('q-img');
        if (qData.img) {
            imgEl.src = qData.img;
            imgEl.style.display = 'block';
        } else {
            imgEl.style.display = 'none';
        }

        const optArea = document.getElementById('options-area');
        optArea.innerHTML = '';
        
        qData.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx + 1, btn);
            optArea.appendChild(btn);
        });

        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(selectedAns, btn) {
        const qData = pool[currentQuestionIndex];
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.disabled = true);

        const feedbackArea = document.getElementById('feedback-area');
        const feedbackMsg = document.getElementById('feedback-msg');
        const expText = document.getElementById('feedback-exp');
        const expImg = document.getElementById('exp-img');

        feedbackArea.style.display = 'block';

        if (selectedAns === qData.ans) {
            btn.classList.add('correct');
            feedbackMsg.innerHTML = '<span style="color:var(--success);">⭕ 正解！</span>';
            feedbackArea.style.borderColor = 'var(--success)';
        } else {
            btn.classList.add('incorrect');
            btns[qData.ans - 1].classList.add('correct');
            feedbackMsg.innerHTML = '<span style="color:var(--danger);">❌ 不正解...</span>';
            feedbackArea.style.borderColor = 'var(--danger)';
            errors++;
            document.getElementById('error-counter').innerText = `ミス: ${errors}`;
        }

        if (qData.exp) {
            expText.innerText = "【解説】\n" + qData.exp;
            expText.style.display = 'block';
        } else {
            expText.style.display = 'none';
        }

        if (qData.expImg) {
            expImg.src = qData.expImg;
            expImg.style.display = 'block';
        } else {
            expImg.style.display = 'none';
        }

        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        const res = document.getElementById('result-screen');
        const msg = document.getElementById('result-msg');
        const act = document.getElementById('result-actions');
        res.style.display = 'block';
        act.innerHTML = '';
        
        if (errors === 0) {
            msg.innerHTML = `<span style="color:green; font-size:1.8rem;">🎉 全問クリア！</span><br><br>完璧です！この調子で合格を目指しましょう！`;
        } else {
            msg.innerHTML = `<span style="color:var(--danger); font-size:1.8rem;">結果: ${errors}問のミス</span><br><br>全問正解を目指してやり直しましょう！`;
            act.innerHTML += `<button class="next-btn" style="display:block; background:#6c757d; margin-bottom:15px;" onclick="retry()">間違えた問題を含めてもう一度</button>`;
        }
        act.innerHTML += `<button class="next-btn" style="display:block; background:var(--primary);" onclick="location.reload()">モード選択に戻る</button>`;
    }

    function retry() {
        prepareSet(0);
    }
</script>
