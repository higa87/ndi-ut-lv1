<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDI LV1 試験対策アプリ（1章〜8章）</title>
  <style>
    :root {
      --primary: #007bff;
      --success: #28a745;
      --danger: #dc3545;
      --bg: #f4f7f9;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      color: var(--text);
    }

    .app-container {
      max-width: 800px;
      width: 100%;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid #eee;
      padding-bottom: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .config-area {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .sub-note {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 10px;
      line-height: 1.5;
    }

    .question-box {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 20px;
      font-weight: 500;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .feedback-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .image-wrap {
      display: grid;
      gap: 12px;
      margin: 16px 0 24px;
    }

    .question-image {
      max-width: 100%;
      height: auto;
      display: block;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }

    .image-note {
      font-size: 0.9rem;
      color: var(--muted);
      padding: 10px 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: #fafafa;
    }

    .options-grid {
      display: grid;
      gap: 12px;
    }

    .option {
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      background: white;
      text-align: left;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    .option:hover:not(:disabled) {
      border-color: var(--primary);
      background: #f0f7ff;
    }

    .option:disabled {
      cursor: default;
    }

    .correct {
      background: #e6ffed !important;
      border-color: var(--success) !important;
      color: #155724;
      font-weight: bold;
    }

    .incorrect {
      background: #fff5f5 !important;
      border-color: var(--danger) !important;
      color: #721c24;
    }

    .feedback {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      display: none;
      background: #eef6ff;
      border-left: 5px solid var(--primary);
    }

    .feedback-title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    .feedback-label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .next-btn,
    .start-btn {
      width: 100%;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .next-btn {
      padding: 18px;
      font-size: 1.1rem;
      display: none;
      margin-top: 20px;
      background: var(--primary);
    }

    .start-btn {
      padding: 20px;
      background: var(--primary);
      font-size: 1.2rem;
    }

    .result-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      line-height: 1.8;
    }

    .small-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .mode-selection {
      text-align: center;
      margin-top: 18px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .mode-btn {
      padding: 12px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    .mode-btn:hover {
      opacity: 0.92;
      transform: scale(1.01);
    }

    .full-width {
      grid-column: 1 / -1;
      padding: 16px;
      font-size: 1.08rem;
    }

    .all-challenge {
      background: #333 !important;
    }

    .custom-area {
      grid-column: 1 / -1;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      margin-top: 4px;
      text-align: left;
    }

    .range-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .range-inputs input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 110px;
      font-size: 1rem;
    }

    .mode-caption {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    @media (max-width: 640px) {
      .mode-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body>
  <div class="app-container">
    <div id="start-screen">
      <h2 style="text-align:center; margin-top: 0;">NDI LV1（1章〜8章）</h2>
      <div class="config-area">
        <label style="cursor:pointer; font-weight:bold; display:block;">
          <input type="checkbox" id="shuffleCheck"> 出題順をランダム（シャッフル）にする
        </label>
        <div class="sub-note">
          問題データは <strong>q / options / ans / exp / img</strong> 形式に対応しています。<br>
          img は <strong>"fig_x_x_x.jpg"</strong> のような文字列1件、または配列でも使えます。
        </div>
      </div>
      <div class="mode-selection">
        <div style="font-weight:bold; margin-bottom:6px;">モードを選択</div>
        <div class="mode-grid">
          <button class="mode-btn" onclick="startQuizByChapter(1)">第1章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(2)">第2章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(3)">第3章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(4)">第4章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(5)">第5章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(6)">第6章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(7)">第7章チャレンジ</button>
          <button class="mode-btn" onclick="startQuizByChapter(8)">第8章チャレンジ</button>
          <button class="start-btn full-width all-challenge" onclick="startQuiz()">全問チャレンジ開始</button>
          <div class="custom-area">
            <div style="font-weight:bold;">範囲指定チャレンジ</div>
            <div class="mode-caption">問題データの並び順で開始〜終了を指定します（1〜全件）。</div>
            <div class="range-inputs">
              <input type="number" id="customStart" placeholder="開始番号" min="1">
              <span>〜</span>
              <input type="number" id="customEnd" placeholder="終了番号" min="1">
              <button class="mode-btn" type="button" onclick="startCustomRange()">スタート</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="quiz-screen" style="display:none;">
      <div class="header">
        <span id="q-counter" style="font-weight:bold;">Q. 1 / -</span>
        <span id="error-counter" style="color:var(--danger); font-weight:bold;">ミス: 0</span>
      </div>

      <div id="q-text" class="question-box"></div>
      <div id="image-area" class="image-wrap" style="display:none;"></div>
      <div id="options-area" class="options-grid"></div>

      <div id="feedback-area" class="feedback">
        <div id="feedback-msg" class="feedback-title"></div>
        <div class="feedback-label">【解説】</div>
        <div id="feedback-exp" class="feedback-text"></div>
      </div>

      <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" style="display:none; text-align:center;">
      <h2>お疲れ様でした！</h2>
      <div class="result-card">
        <div id="result-score" style="font-size: 1.25rem; font-weight: bold;"></div>
        <div id="result-detail" style="margin-top: 10px;"></div>
      </div>
      <button class="start-btn" onclick="location.reload()">最初に戻る</button>
      <div class="small-note">画像が表示されない場合は、HTMLと同じ場所に画像ファイルを置いてください。</div>
    </div>
  </div>

  <script>
    // =========================================================
    // ここに問題データを流し込んでください
    // 形式例:
    // {
    //   q: "問題文",
    //   options: ["選択肢1", "選択肢2"],
    //   ans: 1,
    //   exp: "解説文",
    //   img: "fig_1_1_1.jpg"
    // }
    // img は省略可 / 文字列 / 配列 に対応
    // =========================================================
    const quizData = [
{ q: "問 1.1.1 次の文は，非破壊試験（NDT）の目的について述べたものである。最も適切なものを一つ選び，記号で答えよ。", options: ["a）工業製品が健全であるかどうかを診断するために，NDTが行われる。", "b）工業製品の発注者が価格を上げるために，NDTが行われる。", "c）工業製品の発注者が安心して製品を使用するために，NDTが行われる。", "d）工業製品の大量生産を可能にするために，NDTが行われる。"], ans: 1, exp: "" },
    { q: "問 1.1.2 次の文は，非破壊試験（NDT）の目的について述べたものである。最も適切なものを一つ選び，記号で答えよ。", options: ["a）工業製品の製作時間を短縮するために行う。", "b）工業製品の品質管理のために行う。", "c）工業製品の生産工程を簡素化するために行う。", "d）工業製品を軽量化するために行う。"], ans: 2, exp: "" },
    { q: "問 1.1.3 次の文は，UTレベル1技術者が実施できることについて述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）探傷作業中に，客先からNDT指示書について変更の申し出があり，それに従って直ちに変更し作業をすることができる。", "b）JIS規格によって探傷作業中表示器にきずエコーが現れたので，直ちに上位技術者レベル2又はレベル3にきずの分類を依頼した。", "c）きずエコーが検出された場合は，探触子及びきずの位置，エコー高さ，きずの指示長さ等を正確に測定し，他の技術者が再現できるように記録する。", "d）超音波探傷作業中に，著しく指示書と寸法形状が異なる試験体があったが，材質が同じなのでそのまま探傷を継続する判断をした。"], ans: 3, exp: "" },
    { q: "問 1.1.4 次の文は，UTレベル1技術者が実施できることについて述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）超音波探傷試験を行うときは，きずエコーのみを注意深く観察し，妨害エコーなどは無視して探傷してよい。", "b）超音波探傷試験に関するNDT指示書を作成・変更することができる。", "c）文章化された判定基準がある場合は，レベル3技術者の許可がなくてもきずの分類を行い，合否判定をして，報告することができる。", "d）レベル2又は，レベル3技術者の監督のもとで，超音波探傷試験指示書に基づいて超音波探傷試験を行うことができる。"], ans: 4, exp: "" },
    { q: "問 1.1.5 次の文は，JIS Z 2305について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）放射線透過試験だけについて主な用語と，その定義について記載されている。", "b）超音波探傷試験だけについて主な用語と，その定義について記載されている。", "c）溶接部のきず名称や発生箇所について記載されている。", "d）超音波探傷技術者の役割について記載されている。"], ans: 4, exp: "" },
    { q: "問 1.1.6 次の文は，JIS Z 2300について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）工業分野で用いる非破壊試験に関する主な用語と，その定義について規定している。", "b）工業分野で用いる非破壊試験装置に関する仕様や取扱い方法について規定している。", "c）工業分野で用いる非破壊試験での消耗品（接触媒質など）や工具について規定している。", "d）工業分野で用いる非破壊試験の適用できる工業製品について規定している。"], ans: 1, exp: "" },
    { q: "問 1.1.7 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「前面板」は，斜角探触子だけに使用される用語である。", "b）「ダンパ」は，斜角探触子だけに使用される用語である。", "c）「吸音材」は，垂直探触子だけに使用される用語である。", "d）「保護膜」は，垂直探触子だけに使用される用語である。"], ans: 4, exp: "" },
    { q: "問 1.1.8 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「STB屈折角」は，斜角探傷だけに使用される用語である。", "b）「ビーム路程」は，斜角探傷だけに使用される用語である。", "c）「探傷屈折角」は，垂直探傷だけに使用される用語である。", "d）「公称屈折角」は，垂直探傷だけに使用される用語である。"], ans: 1, exp: "" },
    { q: "問 1.1.9 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「円柱面エコー」は，斜角探傷だけに使用される用語である。", "b）「遅れエコー」は，斜角探傷だけに使用される用語である。", "c）「底面エコー」は，垂直探傷だけに使用される用語である。", "d）「きずエコー」は，垂直探傷だけに使用される用語である。"], ans: 3, exp: "" },
    { q: "問 1.1.10 次の文は，超音波探傷試験で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「円柱面エコー」は，表面波探傷だけに使用される用語である。", "b）「遅れエコー」は，垂直探傷だけに使用される用語である。", "c）「底面エコー」は，斜角探傷だけに使用される用語である。", "d）「きずエコー」は，斜角探傷だけに使用される用語である。"], ans: 2, exp: "" },
    { q: "問 1.1.11 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「モード変換」は，斜角探傷だけに使用される用語である。", "b）「スキップ」は，斜角探傷だけに使用される用語である。", "c）「指向角」は，垂直探傷だけに使用される用語である。", "d）「積算効果」は，斜角探傷だけに使用される用語である。"], ans: 2, exp: "" },
    { q: "問 1.1.12 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「直射法」は，垂直探傷だけに使用される用語である。", "b）「透過法」は，斜角探傷だけに使用される用語である。", "c）「一回反射法」は，斜角探傷だけに使用される用語である。", "d）「パルス反射法」は，斜角探傷だけに使用される用語である。"], ans: 3, exp: "" },
    { q: "問 1.1.13 次の文は，超音波探傷で使用される用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）「入射点」は，垂直探傷だけに使用される用語である。", "b）「F/B」は，斜角探傷だけに使用される用語である。", "c）「距離振幅特性」は，斜角探傷だけに使用される用語である。", "d）「積算効果」は，垂直探傷だけに使用される用語である。"], ans: 4, exp: "" },
    { q: "問 1.1.14 斜角探傷で 0.5S や 1.0S という記号は何の意味か。下記のうち該当するものを一つ選び，記号で答えよ。", options: ["a）超音波ビームが探傷面と反対側の面又は探傷面で反射する点を表す記号", "b）感度表示の記号", "c）入射点と試験体端面の距離を表す記号", "d）探傷面の粗さを表す記号"], ans: 1, exp: "" },
    { q: "問 1.1.15 次の文は，溶接部の斜角探傷に関する用語について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）斜角探触子を溶接線に対して，一定角度で前後に動かす方法を斜め平行走査という。", "b）斜角探触子の入射点から溶接部の基準線までの探傷面上の距離を探触子きず距離という。", "c）余盛のために斜角探触子を近づけることができないため，探傷断面上で超音波ビームが当たらない領域を探傷不能領域という。", "d）接近限界長さは斜角探触子を溶接部に最も接近させた場合の，溶接部中心までのビーム路程をいう。"], ans: 3, exp: "" },
    { q: "問 1.2.1 次の文は，超音波探傷試験に関する規格について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）JIS Z 2344 は，鋼溶接部の超音波探傷試験方法についての規格である。", "b）JIS Z 3060 は，鋼溶接部の超音波探傷試験方法についての規格である。", "c）JIS Z 0587 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "d）JIS Z 0801 は，建築用鋼板及び平鋼の超音波探傷試験による等級分類及び判定基準についての規格である。"], ans: 2, exp: "" },
    { q: "問 1.2.2 次の文は，超音波探傷試験に関する規格について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）JIS G 0801 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "b）JIS G 3104 は，圧力容器用鋼板の超音波探傷検査方法についての規格である。", "c）JIS G 0587 は，鋼溶接部の超音波探傷試験方法についての規格である。", "d）JIS G 3060 は，鋼溶接部の超音波探傷試験方法についての規格である。"], ans: 1, exp: "" },
    { q: "問 1.2.3 次の文は，JIS G 0587 について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）超音波探傷試験用標準試験片に関する規格である。", "b）鋼溶接部の超音波探傷試験方法に関する規格である。", "c）炭素鋼鍛鋼品及び低合金鋼鍛鋼品の超音波探傷試験方法に関する規格である。", "d）金属材料のパルス反射法による超音波探傷試験方法通則に関する規格である。"], ans: 3, exp: "" },
    { q: "問 1.2.4 次の文は，JIS Z 2355-1 について述べたものである。正しいものを一つ選び，記号で答えよ。", options: ["a）非破壊試験－超音波厚さ測定－第1部：測定方法に関する規格である。", "b）超音波探触子の性能測定方法に関する規格である。", "c）圧力容器用鋼板の超音波探傷検査方法に関する規格である。", "d）ステンレス鋼板の超音波探傷検査方法に関する規格である。"], ans: 1, exp: "" },

{ q: "問6.1.17 次の文は、JIS Z 3060によって鋼溶接部の斜角探傷を行う場合の、STB-A2を用いた探傷感度の調整方法について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["5C10×10A70の探触子を用いて調整する場合は、φ2×2 mm（φ2×2 mm）の標準穴からのエコー高さをH線に合わせる。", "5C10×10A65の探触子を用いて調整する場合は、φ4×4 mm（φ4×4 mm）の標準穴からのエコー高さをM線に合わせる。", "5C10×10A60の探触子を用いて調整する場合は、φ4×4 mm（φ4×4 mm）の標準穴からのエコー高さをH線に合わせ、さらに6 dB感度を高める。", "5C10×10A45の探触子を用いて調整する場合は、φ4×4 mm（φ4×4 mm）の標準穴からのエコー高さをH線に合わせる。"], ans: 2, exp: "", },

{ q: "問6.1.20 次の文は、鋼溶接部の斜角探傷における、探傷装置の調整要領について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["斜角探触子の入射点の測定は、STB-A3のφ8 mmの円柱穴部分を利用して行う。", "測定範囲の調整は、STB-A32のR100 mmとR50 mmの曲面部分を利用して行う。", "斜角探触子の屈折角の測定は、STB-A21を用いて測定する。", "エコー高さ区分線の作成は、RB-Eを用いて行う。"], ans: 2, exp: "", },
{ q: "問6.1.21 次の文は、JIS Z 3060により鋼溶接部の斜角探傷を行うための準備作業について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["探傷前の試験体の準備として溶接部近傍に付着しているスパッタなどは、ケレン棒などにより除去する。", "超音波探傷器のエコー高さ区分線はSTB-A1を用いて作成する。", "板厚を測定し、公称屈折角から求めた0.5スキップ、1スキップのビーム路程を試験体上にけがく。", "探触子の走査部分に浮いたスケールがある場合は、ハンドグラインダで除去するか又はタガネなどを用いて平滑にする。"], ans: 1, exp: "", },
{ q: "問6.1.22 次の文は、鋼溶接部の斜角探傷において、探傷のための溶接部探触子距離のけがき線は溶接線に平行に、片面両側のそれぞれ0.5Sと1Sの位置に描く。けがき線の位置を計算する式として、正しいものをそれぞれ一つ選び、記号で答えよ。ただし、Yはけがき線の位置、tは板厚、θは屈折角である。\n[1] 0.5スキップの位置の計算式を一つ選べ。", options: ["Y = t × sin θ", "Y = t × cos θ", "Y = t × tan θ", "Y = 2 × t × tan θ"], ans: 3, exp: "", },
{ q: "問6.1.22 次の文は、鋼溶接部の斜角探傷において、探傷のための溶接部探触子距離のけがき線は溶接線に平行に、片面両側のそれぞれ0.5Sと1Sの位置に描く。けがき線の位置を計算する式として、正しいものをそれぞれ一つ選び、記号で答えよ。ただし、Yはけがき線の位置、tは板厚、θは屈折角である。\n[2] 1スキップの位置の計算式を一つ選べ。", options: ["Y = 2 × t × sin θ", "Y = t × cos θ", "Y = t × tan θ", "Y = 2 × t × tan θ"], ans: 4, exp: "", },{ q: "問6.2.1 次の文は、水浸法について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["水浸法は、ほとんどの場合、手動で探触子を走査する。", "水浸法では、直接接触法より探触子の摩耗が著しい。", "水浸探傷法には、全没水浸法と局部水浸法がある。", "水浸法は、手動探傷のように試験体と探触子を接触させて走査する。"], ans: 3, exp: "", },
{ q: "問6.2.2 次の文は、鋼材の水浸法による垂直探傷について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["水中の気泡や水温の変化は、超音波探傷に影響を及ぼさない。", "板厚と同じ厚さの水距離を取る必要がある。", "探触子が試験体表面と非接触であるため、探触子表面の損傷が少ない。", "直接接触法に比べ、試験体表面の粗さの影響を受けやすい。"], ans: 3, exp: "", },
{ q: "問6.2.3 次の文は、鋼材の水浸法による垂直探傷について述べたものである。正しいものを一つ選び、記号で答えよ。", options: ["接触媒質に用いる水は、水道水や工業用水をそのまま使用しても探傷結果に影響を与えることがない。", "水中の音速は、鋼中縦波音速の約1/4である。したがって、水距離の長さを、表示器上で鋼の厚さの1/4以下にしなければならない。", "水浸法では、試験体の表面エコーが大きく現れるので、きずエコーは常にB1エコーとB2エコーの間に現れるように調整しなければならない。", "水浸法は、探触子と試験体の間に水を満たして探傷するので、試験体の表面粗さの影響をあまり受けない。"], ans: 4, exp: "", },

    let currentPool = [];
    let currentIndex = 0;
    let errorCount = 0;
    let currentModeLabel = "全問チャレンジ";
    let normalizedQuizCache = null;

    function forceScrollTop() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;

      const app = document.querySelector(".app-container");
      if (app) {
        app.scrollIntoView({ block: "start", behavior: "auto" });
      }
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function normalizeOptionText(text) {
      const raw = String(text ?? "").trim();
      return raw.replace(/^[\s　]*[A-Za-zａ-ｚＡ-Ｚ][\)）\.．:：]\s*/u, "").trim();
    }

    function normalizeExplanationText(text) {
      let exp = String(text ?? "").trim();

      exp = exp.replace(/^【解説(?:・メモ)?】\s*/u, "").trim();
      exp = exp.replace(/^解答表（A\d+）より、正解は[^\n]*$/u, "").trim();
      exp = exp.replace(/^解答表\([^\n]+\)より、正解は[^\n]*$/u, "").trim();

      return exp || "解説はありません。";
    }

    function normalizeQuizData(rawData) {
      return rawData.map((item, index) => {
        const options = Array.isArray(item.options)
          ? item.options.map(opt => normalizeOptionText(opt))
          : [];

        const ans = Number(item.ans);

        const images = Array.isArray(item.img)
          ? item.img.filter(Boolean).map(String)
          : item.img
            ? [String(item.img)]
            : [];

        return {
          q: String(item.q ?? "").trim(),
          options,
          ans,
          exp: normalizeExplanationText(item.exp),
          images,
          _index: index + 1
        };
      });
    }

    function validateQuizData(data) {
      const errors = [];

      data.forEach(item => {
        if (!item.q) {
          errors.push(`問題 ${item._index}: q が空です。`);
        }
        if (!Array.isArray(item.options) || item.options.length < 2) {
          errors.push(`問題 ${item._index}: options は2件以上必要です。`);
        }
        if (!Number.isInteger(item.ans) || item.ans < 1 || item.ans > item.options.length) {
          errors.push(`問題 ${item._index}: ans が不正です。options の数に合う 1始まりの整数にしてください。`);
        }
      });

      return errors;
    }

    function setMultilineText(element, text) {
      element.textContent = text || "";
    }

    function renderImages(imageNames) {
      const imageArea = document.getElementById("image-area");
      imageArea.innerHTML = "";

      if (!imageNames || imageNames.length === 0) {
        imageArea.style.display = "none";
        return;
      }

      imageNames.forEach(name => {
        const img = document.createElement("img");
        img.className = "question-image";
        img.src = name;
        img.alt = `設問図: ${name}`;
        img.loading = "lazy";

        img.onerror = () => {
          const note = document.createElement("div");
          note.className = "image-note";
          note.textContent = `画像を読み込めませんでした: ${name}`;
          imageArea.appendChild(note);
          img.remove();
        };

        imageArea.appendChild(img);
      });

      imageArea.style.display = "grid";
    }


    function getPreparedQuizData() {
      if (quizData.length === 0) {
        alert("問題データが空です。quizData 配列にデータを追加してください。");
        return null;
      }

      if (!normalizedQuizCache) {
        const normalized = normalizeQuizData(quizData);
        const validationErrors = validateQuizData(normalized);

        if (validationErrors.length > 0) {
          alert("問題データに不備があります。\n\n" + validationErrors.join("\n"));
          return null;
        }

        normalizedQuizCache = normalized;
      }

      return normalizedQuizCache;
    }

    function extractChapterNumber(questionText) {
      const match = String(questionText || "").match(/^問\s*(\d+)\./);
      return match ? Number(match[1]) : null;
    }

    function beginQuiz(pool, modeLabel) {
      if (!pool || pool.length === 0) {
        alert("選択した範囲の問題が見つかりませんでした。");
        return;
      }

      currentPool = [...pool];
      currentModeLabel = modeLabel || "全問チャレンジ";

      if (document.getElementById("shuffleCheck").checked) {
        shuffleArray(currentPool);
      }

      currentIndex = 0;
      errorCount = 0;

      document.getElementById("start-screen").style.display = "none";
      document.getElementById("result-screen").style.display = "none";
      document.getElementById("quiz-screen").style.display = "block";

      forceScrollTop();
      loadQuestion();
    }

    function startQuizByChapter(chapterNumber) {
      const normalized = getPreparedQuizData();
      if (!normalized) return;

      const filtered = normalized.filter(item => extractChapterNumber(item.q) === chapterNumber);
      beginQuiz(filtered, `第${chapterNumber}章チャレンジ`);
    }

    function startCustomRange() {
      const normalized = getPreparedQuizData();
      if (!normalized) return;

      const start = Number(document.getElementById("customStart").value);
      const end = Number(document.getElementById("customEnd").value);

      if (!Number.isInteger(start) || !Number.isInteger(end)) {
        alert("開始番号と終了番号を入力してください。");
        return;
      }

      if (start < 1 || end < 1 || start > end || end > normalized.length) {
        alert(`範囲指定が不正です。1〜${normalized.length} の範囲で入力してください。`);
        return;
      }

      const filtered = normalized.slice(start - 1, end);
      beginQuiz(filtered, `範囲指定 ${start}〜${end}`);
    }

    function startQuiz() {
      const normalized = getPreparedQuizData();
      if (!normalized) return;
      beginQuiz(normalized, "全問チャレンジ");
    }

    function loadQuestion() {
      if (currentIndex >= currentPool.length) {
        showResult();
        return;
      }

      const data = currentPool[currentIndex];

      document.getElementById("q-counter").innerText = `Q. ${currentIndex + 1} / ${currentPool.length}`;
      document.getElementById("error-counter").innerText = `ミス: ${errorCount}`;

      setMultilineText(document.getElementById("q-text"), data.q);
      renderImages(data.images);

      const area = document.getElementById("options-area");
      area.innerHTML = "";

      data.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        const optionLabel = `${String.fromCharCode(97 + i)}) `;
        btn.textContent = optionLabel + opt;
        btn.onclick = () => checkAnswer(i + 1, btn);
        area.appendChild(btn);
      });

      document.getElementById("feedback-area").style.display = "none";
      document.getElementById("next-btn").style.display = "none";

      requestAnimationFrame(() => {
        forceScrollTop();
      });
    }

    function checkAnswer(choice, btn) {
      const data = currentPool[currentIndex];
      const allBtns = document.querySelectorAll(".option");

      allBtns.forEach(b => {
        b.disabled = true;
      });

      const feedbackMsg = document.getElementById("feedback-msg");
      const feedbackExp = document.getElementById("feedback-exp");

      if (choice === data.ans) {
        btn.classList.add("correct");
        feedbackMsg.innerText = "⭕ 正解！";
        feedbackMsg.style.color = "var(--success)";
      } else {
        btn.classList.add("incorrect");

        const correctBtn = allBtns[data.ans - 1];
        if (correctBtn) {
          correctBtn.classList.add("correct");
        }

        feedbackMsg.innerText = "❌ 不正解...";
        feedbackMsg.style.color = "var(--danger)";
        errorCount++;
        document.getElementById("error-counter").innerText = `ミス: ${errorCount}`;
      }

      setMultilineText(feedbackExp, data.exp);
      document.getElementById("feedback-area").style.display = "block";
      document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
      currentIndex++;
      loadQuestion();
    }

    function showResult() {
      const total = currentPool.length;
      const correctCount = total - errorCount;
      const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;

      document.getElementById("quiz-screen").style.display = "none";
      document.getElementById("result-screen").style.display = "block";
      document.getElementById("result-score").innerText =
        `全 ${total} 問中、${correctCount} 問正解 / ミス ${errorCount} 回`;
      document.getElementById("result-detail").innerText = `${currentModeLabel} / 正答率 ${accuracy}%`;

      requestAnimationFrame(() => {
        forceScrollTop();
      });
    }
  </script>
</body>
